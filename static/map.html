<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全球矿业地图 — 材料价格通</title>
<script>
(function(){try{var t=localStorage.getItem('theme');if(t==='light'){document.documentElement.setAttribute('data-theme','light');document.documentElement.classList.remove('dark')}}catch(e){}})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700;900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #09090b;
    --bg-secondary: #18181b;
    --bg-card: #1c1c21;
    --bg-card-hover: #232329;
    --border: #27272a;
    --border-subtle: #1e1e22;
    --text-primary: #fafafa;
    --text-secondary: #a1a1aa;
    --text-muted: #71717a;
    --map-bg: #111113;
    --map-land: #27272a;
    --map-border-line: #3f3f46;
    --map-ocean: #09090b;
    --accent-green: #22c55e;
    --accent-red: #ef4444;
    --accent-amber: #f59e0b;
    --accent-blue: #3b82f6;
    --accent-purple: #a855f7;
    --accent-cyan: #06b6d4;
    --glow-green: rgba(34, 197, 94, 0.12);
  }

  [data-theme="light"] {
    --bg-primary: #ffffff;
    --bg-secondary: #f8fafc;
    --bg-card: #ffffff;
    --bg-card-hover: #f1f5f9;
    --border: #e2e8f0;
    --border-subtle: #f1f5f9;
    --text-primary: #0f172a;
    --text-secondary: #475569;
    --text-muted: #94a3b8;
    --map-bg: #f0f4f8;
    --map-land: #e2e8f0;
    --map-border-line: #cbd5e1;
    --map-ocean: #f0f4f8;
    --accent-green: #16a34a;
    --accent-red: #dc2626;
    --accent-amber: #d97706;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html {
    scroll-behavior: smooth;
    scrollbar-width: thin;
    scrollbar-color: #27272a #09090b;
  }

  body {
    font-family: 'DM Sans', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow-x: hidden;
    transition: background 0.3s, color 0.3s;
  }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg-primary); }
  ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }

  [data-theme="light"]::-webkit-scrollbar-track { background: #f8fafc; }
  [data-theme="light"]::-webkit-scrollbar-thumb { background: #cbd5e1; }

  /* ===== HEADER ===== */
  .site-header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(9, 9, 11, 0.82);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border-bottom: 1px solid var(--border);
    transition: background 0.3s, border-color 0.3s;
  }

  [data-theme="light"] .site-header {
    background: rgba(255, 255, 255, 0.88);
  }

  .header-inner {
    max-width: 1280px; margin: 0 auto;
    padding: 0 24px; height: 64px;
    display: flex; align-items: center; justify-content: space-between;
  }

  .logo-group { display: flex; align-items: center; gap: 10px; text-decoration: none; }

  .logo-icon {
    width: 34px; height: 34px; border-radius: 9px;
    background: linear-gradient(135deg, #f59e0b 0%, #f97316 100%);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 20px rgba(245, 158, 11, 0.25);
  }

  .logo-icon svg { width: 18px; height: 18px; }

  .logo-text {
    font-weight: 700; font-size: 18px; letter-spacing: -0.5px;
    color: var(--text-primary); transition: color 0.3s;
  }

  .nav-links { display: flex; align-items: center; gap: 4px; }

  .nav-links a {
    padding: 7px 14px; border-radius: 7px; font-size: 14px;
    font-weight: 500; color: var(--text-secondary);
    text-decoration: none; transition: all 0.2s;
  }

  .nav-links a:hover { color: var(--text-primary); background: rgba(255,255,255,0.06); }
  .nav-links a.active { color: var(--text-primary); background: rgba(255,255,255,0.08); }

  [data-theme="light"] .nav-links a:hover { background: rgba(0,0,0,0.04); }
  [data-theme="light"] .nav-links a.active { background: rgba(0,0,0,0.06); }

  .header-actions { display: flex; align-items: center; gap: 8px; }

  .theme-toggle, .lang-toggle {
    padding: 7px 14px; border-radius: 8px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    color: var(--text-secondary); font-size: 13px;
    font-weight: 500; cursor: pointer; transition: all 0.2s;
  }

  .theme-toggle:hover, .lang-toggle:hover {
    border-color: #3f3f46; color: var(--text-primary);
  }

  [data-theme="light"] .theme-toggle, [data-theme="light"] .lang-toggle {
    background: rgba(0,0,0,0.04);
  }

  /* ===== HERO ===== */
  .hero {
    text-align: center; padding: 56px 24px 24px;
    position: relative;
  }

  .hero::before {
    content: '';
    position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 600px; height: 350px;
    background: radial-gradient(ellipse, rgba(99, 102, 241, 0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero-badge {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 6px 16px; border-radius: 100px;
    background: rgba(99, 102, 241, 0.1);
    border: 1px solid rgba(99, 102, 241, 0.2);
    color: #818cf8; font-size: 13px; font-weight: 500;
    margin-bottom: 20px;
  }

  .hero-badge svg { width: 14px; height: 14px; }

  .hero h1 {
    font-size: clamp(28px, 4.5vw, 44px);
    font-weight: 800; letter-spacing: -1px;
    line-height: 1.15; margin-bottom: 14px;
    background: linear-gradient(135deg, var(--text-primary) 0%, var(--text-secondary) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero p {
    font-size: clamp(14px, 2vw, 17px);
    color: var(--text-muted); max-width: 540px; margin: 0 auto;
    line-height: 1.7;
  }

  /* ===== COMMODITY SELECTOR ===== */
  .commodity-selector {
    position: sticky; top: 64px; z-index: 90;
    background: rgba(9, 9, 11, 0.9);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 12px 0;
    transition: background 0.3s, border-color 0.3s;
  }

  [data-theme="light"] .commodity-selector {
    background: rgba(255, 255, 255, 0.92);
  }

  .selector-scroll {
    max-width: 1280px; margin: 0 auto;
    padding: 0 24px;
    overflow-x: auto; white-space: nowrap;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }

  .selector-scroll::-webkit-scrollbar { display: none; }

  .pill-group { display: inline-flex; gap: 8px; }

  .pill {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 8px 16px; border-radius: 100px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-secondary); font-size: 13px;
    font-weight: 500; cursor: pointer;
    transition: all 0.25s; white-space: nowrap;
    flex-shrink: 0;
  }

  .pill:hover {
    border-color: var(--text-muted);
    color: var(--text-primary);
    transform: translateY(-1px);
  }

  .pill.active {
    color: #fff;
    border-color: transparent;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    transform: translateY(-1px);
  }

  .pill-dot {
    width: 8px; height: 8px; border-radius: 50%;
    flex-shrink: 0;
  }

  /* ===== MAIN LAYOUT ===== */
  .main-content {
    max-width: 1280px; margin: 0 auto;
    padding: 24px;
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 24px;
    min-height: calc(100vh - 300px);
  }

  /* ===== MAP CONTAINER ===== */
  .map-container {
    background: var(--map-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    position: relative;
    overflow: hidden;
    min-height: 520px;
    transition: background 0.3s, border-color 0.3s;
  }

  .map-container svg {
    width: 100%; height: 100%;
    display: block;
  }

  .map-legend {
    position: absolute; bottom: 16px; left: 16px;
    background: rgba(9, 9, 11, 0.85);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 12px;
    transition: background 0.3s, border-color 0.3s;
  }

  [data-theme="light"] .map-legend {
    background: rgba(255, 255, 255, 0.9);
  }

  .legend-title {
    font-weight: 600; font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--text-muted); margin-bottom: 8px;
  }

  .legend-item {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 4px; color: var(--text-secondary);
  }

  .legend-dot {
    width: 12px; height: 12px; border-radius: 3px;
    flex-shrink: 0;
  }

  /* ===== TOOLTIP ===== */
  .map-tooltip {
    position: absolute; pointer-events: none;
    background: rgba(9, 9, 11, 0.95);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 50;
    min-width: 180px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  [data-theme="light"] .map-tooltip {
    background: rgba(255, 255, 255, 0.96);
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
  }

  .tooltip-country {
    font-weight: 700; font-size: 15px;
    margin-bottom: 6px; color: var(--text-primary);
  }

  .tooltip-row {
    display: flex; justify-content: space-between;
    gap: 16px; margin-bottom: 3px;
    color: var(--text-secondary);
  }

  .tooltip-row span:last-child {
    font-weight: 600; color: var(--text-primary);
  }

  /* ===== SIDEBAR ===== */
  .sidebar {
    display: flex; flex-direction: column; gap: 12px;
  }

  .sidebar-header {
    display: flex; align-items: center; gap: 10px;
    padding: 16px 20px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    transition: background 0.3s, border-color 0.3s;
  }

  .sidebar-commodity-dot {
    width: 12px; height: 12px; border-radius: 50%;
    flex-shrink: 0;
  }

  .sidebar-commodity-name {
    font-weight: 700; font-size: 16px;
    color: var(--text-primary);
  }

  .sidebar-commodity-sub {
    font-size: 12px; color: var(--text-muted);
  }

  .country-list {
    display: flex; flex-direction: column; gap: 6px;
    max-height: calc(100vh - 340px);
    overflow-y: auto;
    padding-right: 4px;
  }

  .country-card {
    display: flex; align-items: flex-start; gap: 14px;
    padding: 14px 16px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .country-card:hover {
    background: var(--bg-card-hover);
    border-color: var(--text-muted);
    transform: translateX(3px);
  }

  .country-card.highlighted {
    border-color: var(--accent-amber);
    box-shadow: 0 0 16px rgba(245, 158, 11, 0.1);
  }

  .country-rank {
    font-size: 20px; font-weight: 800;
    color: var(--text-muted);
    min-width: 28px; text-align: center;
    line-height: 1;
    padding-top: 2px;
  }

  .country-rank.top3 { color: var(--accent-amber); }

  .country-info { flex: 1; min-width: 0; }

  .country-name-row {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 4px;
  }

  .country-flag { font-size: 16px; line-height: 1; }

  .country-name {
    font-weight: 600; font-size: 14px;
    color: var(--text-primary);
  }

  .country-share {
    font-size: 13px; font-weight: 700;
    color: var(--accent-amber);
    margin-left: auto;
    flex-shrink: 0;
  }

  .country-desc {
    font-size: 12px; color: var(--text-muted);
    line-height: 1.6;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .country-card.expanded .country-desc {
    -webkit-line-clamp: unset;
  }

  /* ===== FOOTER ===== */
  .site-footer {
    border-top: 1px solid var(--border);
    margin-top: 48px;
    padding: 48px 24px 32px;
    background: var(--bg-secondary);
    transition: background 0.3s, border-color 0.3s;
  }

  .footer-inner {
    max-width: 1280px; margin: 0 auto;
    display: grid;
    grid-template-columns: 1.5fr 1fr 1fr 1fr;
    gap: 40px;
  }

  .footer-brand .logo-group { margin-bottom: 12px; }
  .footer-brand p { font-size: 13px; color: var(--text-muted); line-height: 1.7; }

  .footer-col h4 {
    font-size: 13px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--text-secondary);
    margin-bottom: 14px;
  }

  .footer-col a {
    display: block; font-size: 13px;
    color: var(--text-muted); text-decoration: none;
    margin-bottom: 8px; transition: color 0.2s;
  }

  .footer-col a:hover { color: var(--text-primary); }

  .footer-bottom {
    max-width: 1280px; margin: 32px auto 0;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px; color: var(--text-muted);
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 960px) {
    .main-content {
      grid-template-columns: 1fr;
    }
    .sidebar { order: 2; }
    .map-container { min-height: 380px; }
    .country-list { max-height: 400px; }
    .footer-inner {
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
  }

  @media (max-width: 600px) {
    .header-inner { padding: 0 16px; height: 56px; }
    .nav-links { display: none; }
    .hero { padding: 36px 16px 16px; }
    .main-content { padding: 12px; gap: 12px; }
    .footer-inner { grid-template-columns: 1fr; gap: 20px; }
    .footer-bottom { flex-direction: column; gap: 8px; text-align: center; }
  }

  /* ===== LOADING ===== */
  .map-loading {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100%; gap: 16px;
    color: var(--text-muted);
  }

  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent-amber);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Country path transitions */
  .country-path {
    transition: fill 0.4s ease, stroke 0.2s ease, opacity 0.3s ease;
    cursor: pointer;
  }

  .country-path:hover {
    stroke: var(--text-primary) !important;
    stroke-width: 1.5px !important;
  }
</style>
</head>
<body>

<!-- HEADER -->

  <div class="header-inner">
    <a href="/" class="logo-group">
      <div class="logo-icon">
        <svg viewBox="0 0 18 18" fill="none"><rect x="2" y="6" width="3" height="10" rx="1" fill="white"/><rect x="7.5" y="3" width="3" height="13" rx="1" fill="white"/><rect x="13" y="8" width="3" height="8" rx="1" fill="white"/></svg>

<!-- HERO -->

<!-- MAIN -->
<div class="main-content">

      <span data-zh="加载地图数据..." data-en="Loading map data...">加载地图数据...</span>

  <div class="sidebar" id="sidebar">

      </div>
    </div>
    <div class="country-list" id="countryList"></div>
  </div>
</div>

<!-- FOOTER -->
<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-brand">
      <div class="logo-group">
        <div class="logo-icon">
          <svg viewBox="0 0 18 18" fill="none"><rect x="2" y="6" width="3" height="10" rx="1" fill="white"/><rect x="7.5" y="3" width="3" height="13" rx="1" fill="white"/><rect x="13" y="8" width="3" height="8" rx="1" fill="white"/></svg>

    <div class="footer-col">

      <a href="#" data-zh="金属镧" data-en="Lanthanum Metal">金属镧</a>
      <a href="#" data-zh="金属铈" data-en="Cerium Metal">金属铈</a>

// ===== STATE =====
let currentCommodity = 'la2o3';
let currentLang = localStorage.getItem('lang') || 'zh';
let currentTheme = localStorage.getItem('theme') || 'dark';
let worldData = null;
let svg, g, projection, path, zoom;
let highlightedCountry = null;

// ===== THEME =====
function applyTheme(theme) {
  currentTheme = theme;
  if (theme === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
    document.documentElement.classList.remove('dark');
  } else {
    document.documentElement.removeAttribute('data-theme');
    document.documentElement.classList.add('dark');
  }
  try { localStorage.setItem('theme', theme); } catch(e) {}
  const btn = document.querySelector('.theme-toggle');
  if (btn) btn.textContent = theme === 'light' ? '☀️' : '🌙';
  if (svg) updateMapColors();
}

function toggleTheme() {
  applyTheme(currentTheme === 'dark' ? 'light' : 'dark');
}

// ===== LANGUAGE =====
function applyLang(lang) {
  currentLang = lang;
  localStorage.setItem('lang', lang);
  document.querySelectorAll('[data-zh]').forEach(el => {
    const text = el.getAttribute('data-' + lang);
    if (text) {
      if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
        el.placeholder = text;
      } else {
        el.textContent = text;
      }
    }
  });
  // Re-render dynamic elements
  renderPills();
  renderSidebar();
  updateLegendColors();
}

function toggleLang() {
  applyLang(currentLang === 'zh' ? 'en' : 'zh');
}

// ===== PILLS =====
function renderPills() {
  const group = document.getElementById('pillGroup');
  group.innerHTML = '';
  commodities.forEach(c => {
    const pill = document.createElement('button');
    pill.className = 'pill' + (c.id === currentCommodity ? ' active' : '');
    if (c.id === currentCommodity) {
      pill.style.background = c.color;
    }
    pill.innerHTML = `<span class="pill-dot" style="background:${c.color}"></span>${currentLang === 'zh' ? c.name_zh : c.name_en}`;
    pill.onclick = () => selectCommodity(c.id);
    group.appendChild(pill);
  });
}

// ===== SELECT COMMODITY =====
function selectCommodity(id) {
  currentCommodity = id;
  highlightedCountry = null;
  renderPills();
  updateMapColors();
  renderSidebar();
  updateLegendColors();
  updateSidebarHeader();
}

// ===== SIDEBAR HEADER =====
function updateSidebarHeader() {
  const c = commodities.find(x => x.id === currentCommodity);
  const d = productionData[currentCommodity];
  document.getElementById('sidebarDot').style.background = c.color;
  const nameEl = document.getElementById('sidebarName');
  nameEl.setAttribute('data-zh', d.name_zh);
  nameEl.setAttribute('data-en', d.name_en);
  nameEl.textContent = currentLang === 'zh' ? d.name_zh : d.name_en;
}

// ===== SIDEBAR =====
function renderSidebar() {
  const list = document.getElementById('countryList');
  const data = productionData[currentCommodity];
  const c = commodities.find(x => x.id === currentCommodity);
  list.innerHTML = '';

  data.countries.forEach(country => {
    const card = document.createElement('div');
    card.className = 'country-card';
    card.setAttribute('data-code', country.code);
    if (highlightedCountry === country.code) card.classList.add('highlighted');

    card.innerHTML = `
      <div class="country-rank ${country.rank <= 3 ? 'top3' : ''}">${country.rank}</div>
      <div class="country-info">
        <div class="country-name-row">
          <span class="country-flag">${country.flag || ''}</span>
          <span class="country-name">${currentLang === 'zh' ? country.name_zh : country.name_en}</span>
          <span class="country-share">${country.share}</span>
        </div>
        <div class="country-desc">${currentLang === 'zh' ? country.desc_zh : country.desc_en}</div>
      </div>
    `;

    card.addEventListener('mouseenter', () => {
      highlightCountryOnMap(country.code);
    });
    card.addEventListener('mouseleave', () => {
      unhighlightCountryOnMap();
    });
    card.addEventListener('click', () => {
      card.classList.toggle('expanded');
    });

    list.appendChild(card);
  });
}

// ===== MAP HIGHLIGHT =====
function highlightCountryOnMap(code) {
  highlightedCountry = code;
  if (!g) return;
  g.selectAll('.country-path')
    .transition().duration(150)
    .style('opacity', function() {
      return d3.select(this).attr('data-id') === code ? 1 : 0.35;
    })
    .style('stroke-width', function() {
      return d3.select(this).attr('data-id') === code ? '2px' : '0.5px';
    });
}

function unhighlightCountryOnMap() {
  highlightedCountry = null;
  if (!g) return;
  g.selectAll('.country-path')
    .transition().duration(150)
    .style('opacity', 1)
    .style('stroke-width', '0.5px');
}

// ===== LEGEND =====
function updateLegendColors() {
  const c = commodities.find(x => x.id === currentCommodity);
  const color = c.color;
  document.getElementById('legendTop').style.background = color;
  document.getElementById('legendMid').style.background = color + '80';
  document.getElementById('legendLow').style.background = color + '4D';
}

// ===== MAP COLOR =====
function getCountryColor(countryId) {
  const data = productionData[currentCommodity];
  const c = commodities.find(x => x.id === currentCommodity);
  const country = data.countries.find(co => co.code === String(countryId));
  if (!country) return getComputedStyle(document.documentElement).getPropertyValue('--map-land').trim() || '#27272a';
  const color = c.color;
  if (country.rank <= 3) return color;
  if (country.rank <= 7) return color + '80';
  return color + '4D';
}

function getCountryData(countryId) {
  const data = productionData[currentCommodity];
  return data.countries.find(co => co.code === String(countryId));
}

// ===== MAP UPDATE =====
function updateMapColors() {
  if (!g) return;
  g.selectAll('.country-path')
    .transition().duration(500)
    .attr('fill', function() {
      return getCountryColor(d3.select(this).attr('data-id'));
    });
}

// ===== INIT MAP =====
async function initMap() {
  const container = document.getElementById('mapContainer');
  const loading = document.getElementById('mapLoading');

  try {
    const response = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
    worldData = await response.json();
  } catch(e) {
    loading.innerHTML = '<span style="color:var(--accent-red);">Failed to load map data. Please check your internet connection.</span>';
    return;
  }

  loading.style.display = 'none';
  document.getElementById('mapLegend').style.display = 'block';

  const rect = container.getBoundingClientRect();
  const width = rect.width;
  const height = Math.max(rect.height, 520);

  projection = d3.geoNaturalEarth1()
    .scale(width / 5.5)
    .translate([width / 2, height / 2]);

  path = d3.geoPath(projection);

  svg = d3.select('#mapContainer')
    .append('svg')
    .attr('width', width)
    .attr('height', height)
    .style('background', 'var(--map-ocean)');

  // Zoom behavior
  zoom = d3.zoom()
    .scaleExtent([1, 8])
    .on('zoom', (event) => {
      g.attr('transform', event.transform);
    });

  svg.call(zoom);

  g = svg.append('g');

  const countries = topojson.feature(worldData, worldData.objects.countries);

  // Tooltip
  const tooltip = document.getElementById('mapTooltip');

  g.selectAll('.country-path')
    .data(countries.features)
    .enter()
    .append('path')
    .attr('class', 'country-path')
    .attr('d', path)
    .attr('data-id', d => d.id)
    .attr('fill', d => getCountryColor(d.id))
    .attr('stroke', 'var(--map-border-line)')
    .attr('stroke-width', 0.5)
    .on('mouseover', function(event, d) {
      const countryInfo = getCountryData(d.id);
      if (countryInfo) {
        d3.select(this)
          .style('stroke', 'var(--text-primary)')
          .style('stroke-width', '1.5px');

        const name = currentLang === 'zh' ? countryInfo.name_zh : countryInfo.name_en;
        tooltip.innerHTML = `
          <div class="tooltip-country">${countryInfo.flag || ''} ${name}</div>
          <div class="tooltip-row"><span>${currentLang === 'zh' ? '排名' : 'Rank'}</span><span>#${countryInfo.rank}</span></div>
          <div class="tooltip-row"><span>${currentLang === 'zh' ? '全球份额' : 'Global Share'}</span><span>${countryInfo.share}</span></div>
        `;
        tooltip.style.opacity = 1;
      }
    })
    .on('mousemove', function(event) {
      const containerRect = container.getBoundingClientRect();
      let x = event.clientX - containerRect.left + 16;
      let y = event.clientY - containerRect.top - 10;
      if (x + 200 > containerRect.width) x = x - 220;
      if (y + 100 > containerRect.height) y = y - 100;
      tooltip.style.left = x + 'px';
      tooltip.style.top = y + 'px';
    })
    .on('mouseout', function() {
      d3.select(this)
        .style('stroke', 'var(--map-border-line)')
        .style('stroke-width', '0.5px');
      tooltip.style.opacity = 0;
    });

  // Add graticule
  const graticule = d3.geoGraticule10();
  g.insert('path', ':first-child')
    .datum(graticule)
    .attr('d', path)
    .attr('fill', 'none')
    .attr('stroke', 'var(--map-border-line)')
    .attr('stroke-width', 0.2)
    .attr('stroke-opacity', 0.3);

  // Handle resize
  let resizeTimeout;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimeout);
    resizeTimeout = setTimeout(resizeMap, 250);
  });
}

function resizeMap() {
  if (!svg || !worldData) return;
  const container = document.getElementById('mapContainer');
  const rect = container.getBoundingClientRect();
  const width = rect.width;
  const height = Math.max(rect.height, 520);

  projection.scale(width / 5.5).translate([width / 2, height / 2]);

  svg.attr('width', width).attr('height', height);
  g.selectAll('.country-path').attr('d', path);
  g.selectAll('path').filter(function() { return !d3.select(this).classed('country-path'); }).attr('d', path);
}

// ===== INIT =====
document.addEventListener('DOMContentLoaded', () => {
  applyTheme(currentTheme);
  applyLang(currentLang);
  renderPills();
  renderSidebar();
  updateSidebarHeader();
  updateLegendColors();
  initMap();
});
</script>
